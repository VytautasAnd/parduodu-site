<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Parduodu.com – Lietuvos NT rinka: skelbimai, kainos, rinkos duomenys</title>

    <meta name="description"
          content="Butų, namų ir sklypų skelbimai Lietuvoje. NT kainos, rinkos tendencijos ir nekilnojamojo turto duomenys vienoje vietoje.">

    <link rel="canonical" href="https://www.parduodu.com">

    <!-- Open Graph -->
    <meta property="og:title" content="Parduodu.com – Lietuvos NT rinka">
    <meta property="og:description"
          content="NT skelbimai, kainos ir rinkos duomenys Lietuvoje.">
    <meta property="og:image" content="https://www.parduodu.com/social-preview.jpg">
    <meta property="og:url" content="https://www.parduodu.com">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Parduodu.com – Lietuvos NT rinka">
    <meta name="twitter:description"
          content="NT skelbimai, kainos ir rinkos duomenys Lietuvoje.">
    <meta name="twitter:image" content="https://www.parduodu.com/social-preview.jpg">

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Parduodu.com",
      "url": "https://www.parduodu.com",
      "description": "Lietuvos NT rinka: nekilnojamojo turto skelbimai, kainos ir rinkos duomenys.",
      "inLanguage": "lt",
      "publisher": {
        "@type": "Organization",
        "name": "Parduodu.com",
        "url": "https://www.parduodu.com"
      }
    }
    </script>

    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #5f6b82;
            --accent: #23a8a8;
            --border: #dbe3ef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f7fafc 0%, #eef3f8 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px;
        }

        .container {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.05);
        }

        .logo {
            width: 120px;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.8rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--muted);
            line-height: 1.7;
        }

        .pill {
            display: inline-block;
            margin-top: 28px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(35, 168, 168, 0.1);
            color: var(--accent);
            font-size: 0.92rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 42px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .container {
                padding: 36px 24px;
            }

            .subtitle {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <!-- existing SVG logo -->
        <img src="/logo.svg" alt="Parduodu.com logotipas" class="logo">

        <div class="pill">
            Lietuvos NT rinka
        </div>

        <h1>
            NT skelbimai, kainos ir rinkos duomenys
        </h1>

        <p class="subtitle">
            Parduodu.com kuriamas kaip moderni Lietuvos nekilnojamojo turto platforma —
            nuo skelbimų iki rinkos analizės ir NT tendencijų.
        </p>

        <div class="footer">
            Netrukus startuojame.
        </div>
    </main>
</body>
</html>
