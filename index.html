<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Parduodu.com – Lietuvos NT rinka: skelbimai, kainos, rinkos duomenys</title>

    <meta name="description"
          content="Butų, namų ir sklypų skelbimai Lietuvoje. NT kainos, rinkos tendencijos ir nekilnojamojo turto duomenys vienoje vietoje.">

    <link rel="canonical" href="https://www.parduodu.com">

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Parduodu.com – Lietuvos NT rinka">
    <meta property="og:description"
          content="NT skelbimai, kainos ir rinkos duomenys Lietuvoje.">
    <meta property="og:image" content="https://www.parduodu.com/social-preview.jpg">
    <meta property="og:url" content="https://www.parduodu.com">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Parduodu.com – Lietuvos NT rinka">
    <meta name="twitter:description"
          content="NT skelbimai, kainos ir rinkos duomenys Lietuvoje.">
    <meta name="twitter:image" content="https://www.parduodu.com/social-preview.jpg">

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Parduodu.com",
      "url": "https://www.parduodu.com",
      "description": "Lietuvos NT rinka: nekilnojamojo turto skelbimai, kainos ir rinkos duomenys.",
      "inLanguage": "lt",
      "publisher": {
        "@type": "Organization",
        "name": "Parduodu.com",
        "url": "https://www.parduodu.com"
      }
    }
    </script>

    <style>
        :root {
            --text-main: #565b63;
            --text-soft: #7b818a;
            --overlay: rgba(255, 255, 255, 0.58);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Segoe UI", Inter, Arial, sans-serif;
            color: var(--text-main);

            background:
                linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.38) 0%,
                    rgba(255, 255, 255, 0.18) 45%,
                    rgba(255, 255, 255, 0.42) 100%
                ),
                url("/background-nt.png");

            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;

            min-height: 100vh;
            overflow: hidden;
        }

        .page {
            position: relative;
            min-height: 100vh;
            padding: 48px 56px;
        }

        .logo {
            position: absolute;
            top: 48px;
            left: 56px;
            z-index: 5;
        }

        .logo img {
            width: 122px;
            height: auto;
            display: block;
        }

        .content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .message {
            max-width: 980px;
            margin-top: -30px;
        }

        h1 {
            margin: 0;

            font-weight: 300;

            font-size: clamp(2.5rem, 5vw, 5rem);

            line-height: 1.22;

            letter-spacing: 0.035em;

            color: rgba(74, 78, 86, 0.88);

            text-shadow:
                0 1px 1px rgba(255,255,255,0.35);
        }

        .divider {
            width: 82px;
            height: 1px;

            margin: 42px auto 34px;

            background: rgba(88, 92, 100, 0.42);
        }

        .status {
            margin: 0;

            font-size: clamp(0.82rem, 1.15vw, 1rem);

            letter-spacing: 0.42em;

            text-transform: uppercase;

            color: rgba(90, 95, 102, 0.72);

            font-weight: 500;
        }

        .seo-text {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 768px) {
            body {
                background-position: center bottom;
            }

            .page {
                padding: 28px;
            }

            .logo {
                top: 28px;
                left: 28px;
            }

            .logo img {
                width: 104px;
            }

            .message {
                margin-top: -12px;
            }

            h1 {
                letter-spacing: 0.015em;
            }

            .status {
                letter-spacing: 0.26em;
            }
        }
    </style>
</head>

<body>

<div class="page">

    <header class="logo" aria-label="Parduodu.com">
        <img src="/logo.svg" alt="Parduodu.com logotipas">
    </header>

    <main class="content">

        <section class="message" aria-labelledby="main-title">

            <h1 id="main-title">
                NT skelbimai,<br>
                kainos ir rinkos duomenys
            </h1>

            <div class="divider" aria-hidden="true"></div>

            <p class="status">
                Tinklapis kuriamas
            </p>

            <p class="seo-text">
                Parduodu.com kuriamas kaip Lietuvos nekilnojamojo turto platforma:
                NT skelbimai, kainų tendencijos ir rinkos duomenys vienoje vietoje.
            </p>

        </section>

    </main>

</div>

</body>
</html>
